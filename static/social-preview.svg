<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" font-family="'Courier New', Courier, monospace">
  <!-- Background -->
  <rect width="1280" height="640" fill="#060606"/>

  <!-- Border frame -->
  <rect x="32" y="32" width="1216" height="576" rx="6" fill="none" stroke="#163d16" stroke-width="1.5"/>

  <!-- Corner ticks -->
  <line x1="32"   y1="32"  x2="80"   y2="32"  stroke="#00b82e" stroke-width="2"/>
  <line x1="32"   y1="32"  x2="32"   y2="80"  stroke="#00b82e" stroke-width="2"/>
  <line x1="1248" y1="32"  x2="1200" y2="32"  stroke="#00b82e" stroke-width="2"/>
  <line x1="1248" y1="32"  x2="1248" y2="80"  stroke="#00b82e" stroke-width="2"/>
  <line x1="32"   y1="608" x2="80"   y2="608" stroke="#00b82e" stroke-width="2"/>
  <line x1="32"   y1="608" x2="32"   y2="560" stroke="#00b82e" stroke-width="2"/>
  <line x1="1248" y1="608" x2="1200" y2="608" stroke="#00b82e" stroke-width="2"/>
  <line x1="1248" y1="608" x2="1248" y2="560" stroke="#00b82e" stroke-width="2"/>

  <!-- Vertical divider -->
  <line x1="480" y1="96" x2="480" y2="544" stroke="#163d16" stroke-width="1.5"/>

  <!-- ── Lock glyph — left third, centred at x=256, y=320 ── -->
  <!-- shackle -->
  <path d="M206 310 L206 268 A50 50 0 0 1 306 268 L306 310"
        fill="none" stroke="#00ff41" stroke-width="18" stroke-linecap="square"/>
  <!-- body -->
  <rect x="178" y="306" width="156" height="118" rx="8"
        fill="none" stroke="#00ff41" stroke-width="15"/>
  <!-- keyhole dot -->
  <circle cx="256" cy="358" r="16" fill="#00ff41"/>
  <!-- keyhole slot -->
  <rect x="247" y="368" width="18" height="26" fill="#00ff41"/>

  <!-- ── Text block — right side, centred at x=880 ── -->
  <!-- PASSPHRASE -->
  <text x="880" y="262"
        fill="#00ff41"
        font-size="80"
        font-weight="bold"
        letter-spacing="10"
        text-anchor="middle">PASSPHRASE</text>
  <!-- GENERATOR -->
  <text x="880" y="352"
        fill="#00b82e"
        font-size="80"
        font-weight="bold"
        letter-spacing="10"
        text-anchor="middle">GENERATOR</text>

  <!-- Divider under title -->
  <line x1="560" y1="378" x2="1200" y2="378" stroke="#163d16" stroke-width="1.5"/>

  <!-- Tagline -->
  <text x="560" y="422"
        fill="#00b82e"
        font-size="22"
        letter-spacing="4"
        text-anchor="start">// CRYPTOGRAPHICALLY RANDOM · HUMAN READABLE</text>

  <!-- Cursor (start of prompt) -->
  <rect x="560" y="468" width="13" height="24" fill="#00ff41" opacity="0.6"/>

  <!-- Prompt line (offset right of cursor) -->
  <text x="578" y="490"
        fill="#163d16"
        font-size="20"
        letter-spacing="3"
        text-anchor="start">$ generate --words 4 --separator - --count 10</text>

  <!-- Bottom-left label -->
  <text x="64" y="596"
        fill="#163d16"
        font-size="16"
        letter-spacing="4">// amanguptabay/passphrasegenerator</text>

  <!-- Top-right label -->
  <text x="1216" y="72"
        fill="#163d16"
        font-size="16"
        letter-spacing="4"
        text-anchor="end">v1.0</text>
</svg>
